name: Deploy Server to Amazon ECS

on:
  push:
    branches:
      - main # Change this if your main branch is named 'master'
    paths:
      - 'Server/**' # Only trigger if changes are made inside the Server folder

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: uniresourcehub-server 
  ECS_SERVICE: uniresourcehub-server-service # Ensure this matches your ECS Service name
  ECS_CLUSTER: UniResourceHub-Cluster # Ensure this matches your ECS Cluster name
  ECS_TASK_DEFINITION_FAMILY: uniresourcehub-server-task # Ensure this matches your Task family
  CONTAINER_NAME: server-container # Ensure this matches your container name in the Task Definition

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Get AWS Identity
      run: aws sts get-caller-identity

    - name: Ensure ECR repository exists
      run: |
        aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} || \
        aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }}

    - name: Ensure ECS cluster exists
      run: |
        STATUS=$(aws ecs describe-clusters --clusters ${{ env.ECS_CLUSTER }} --query "clusters[0].status" --output text 2>/dev/null || echo "NONE")
        if [ "$STATUS" != "ACTIVE" ]; then
          echo "Cluster not found. Creating cluster: ${{ env.ECS_CLUSTER }}"
          aws ecs create-cluster --cluster-name ${{ env.ECS_CLUSTER }}
        else
          echo "Cluster already exists and is ACTIVE."
        fi

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      working-directory: ./Server
      run: |
        # Build a docker container and push it to ECR so that it can be deployed to ECS.
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Ensure ECS task definition exists
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Substitute secret placeholders in the template
        envsubst < .github/task-definition.json > task-definition-filled.json
        # Register the task definition if it doesn't already exist
        aws ecs describe-task-definition --task-definition ${{ env.ECS_TASK_DEFINITION_FAMILY }} \
        || aws ecs register-task-definition --cli-input-json file://task-definition-filled.json

    - name: Download current task definition
      run: |
        aws ecs describe-task-definition --task-definition ${{ env.ECS_TASK_DEFINITION_FAMILY }} \
        --query taskDefinition > task-definition.json

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
